#config file to run the tuned qrf to compare
experiment_name: "QRF_Tuned"
model_type: "qrf"
#define the data used in the experiment
data:
  targets: ["Headline", "Core"]     #define the target variables to devide in X and Y
  horizons: [3, 6, 9, 12]   #comparison on predefined list of forecast horizons  
  #recursive updating settings (out-of-sample predictions like in ECB paper):
  evaluation_scheme: "expanding_window"
  eval_start_date: "2012-07-01"     #->when start making predictions, need enough training information-> approx 160 datapoints, ECB used 10 years
  retrain_step_months: 3      #update forecast every quarter, see reasoning in thesis

#specify model 
model:
  tune_hyperparameters: true   #use hyperparameter tuning
  #define search space
  param_grid:
    n_estimators: [500,750, 1000]   #nr. of decision trees used: while Meinshausen proposed 1000 by default, ECB used 500
                                #for 250-300 rows, 1000 trees should be more than enough to capture the patterns
    min_samples_leaf: [5, 10, 20]  #min of data points allowed in final leaf (Meinshausen default:" have more than 10 observations in each node"; ECB did same default)
    max_features: ["sqrt", 0.333]     #how many features tree allow to look at (ECB uses 0.333; sqrt is standard default in literature)
    n_jobs: -1    #use all CPU power 
    random_state: 42    #for reproducibility: seed